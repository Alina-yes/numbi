<!DOCTYPE html>
<html>
<head>
    <title>Interactive Number Learning App</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        h1 { color: #4CAF50; }
        .number {
            font-size: 48px;
            font-weight: bold;
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Learn Your Numbers!</h1>
    <div class="number" id="numberDisplay">0</div>
    <button onclick="generateNumber()">Show Random Number</button>
    <script>
        function generateNumber() {
            const randomNumber = Math.floor(Math.random() * 100);
            document.getElementById('numberDisplay').innerText = randomNumber;
        }
    </script>
</body>
</html>
